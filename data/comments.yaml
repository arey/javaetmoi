    Je viens justement de coder a peu près la même chose avec Vue et Symfony. Vue 2.x est vraiment un excellent framework, je suis bluffé chaque jour et de plus en plus adepte. Pour ma part j'y ajoute TypeScript et quelques librairies comme <a href="https://github.com/vuejs/vue-class-component" rel="nofollow">vue-class-component</a> et <a href="https://github.com/kaorun343/vue-property-decorator" rel="nofollow">vue-property-decorator</a>, et c'est juste une merveille de lisibilité et de stabilité.

    Je suis aussi allé plus loin sur mon projet : Le formulaire n'est pas décrit par une configuration JSON, mais est fournie par une méthode de l'API REST qui fait de l'introspection sur les entités ORM (Doctrine dans mon cas, mais on peut très bien faire la même chose avec Hibernate/JPA).

    Par exemple, si un champs de la base de donnée est marqué "nullable=false", la règle "required" est automatiquement ajoutée. Ca gère aussi les relations entre les entités, en affichant une liste de  choix pour les champs qui correspondent à une collection d'une autre entité. J'ai ajouté quelques annotations spécifiques comme @Label, @Description, @Validation, pour personnaliser des informations qui ne peuvent pas être prises directement du modèle de l'ORM.

    A noter que vee-validate est en pleine transformation en ce moment et qu'il ne faut pas hésiter à utiliser la version master du github. Certaines fonctionnalités ne sont pas encore documentées et il faut fouiller les issues github pour trouver son bonheur ...
