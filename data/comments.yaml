    Difficile de répondre à tes interrogations en ne connaissant ni le contenu du partenariat unissant Zenika et SpringSource, ni la stratégie de SpringSource en termes de formation.
    Ce que je sais, c'est que les futurs formateurs doivent assister à la formation et passer leur certification. Je ne me demande si un examinateur n'assiste pas également à l'un de leurs premier cours. Qui plus est, je pense que les formateurs sont sélectionnés pour leurs compétences et leur implication dans la démocratisation de Spring. Co-auteur de 3 livres sur Spring, la crédibilité de mon formateur n'était plus à démontrer. C'est un gage de qualité pour SpringSource.
