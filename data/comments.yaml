  content: |-
    Sympa, ça m'a bien aidé.

    Par contre j'ai pas mal galéré sur le pdo_mysql. En effet
    <pre class="lang:default decode:true ">RUN docker-php-ext-install pdo mysql
    RUN docker-php-ext-install pdo mysqli</pre>
    ne marche pas, ou plus.

    Et à en croire <a href="https://github.com/docker-library/php/tree/master/5.6" rel="nofollow">https://github.com/docker-library/php/tree/master/5.6</a>

    C'est plutôt ça qu'il faut mettre :
    <pre class="lang:default decode:true">RUN docker-php-ext-install pdo pdo_mysql
    RUN docker-php-ext-enable pdo pdo_mysql</pre>
    Qui a fonctionné.

    Cordialement.
