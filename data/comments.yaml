  published: 2013-10-28T12:38:15Z
  parent_id: "0"
  content: |-
    Bonjour,

    tout d'abord je teins à vous remercier pour cet article.

    J'ai quelques remarques :

    *Au niveau des vos explications pour les réponses des question 1 et 22, vous dites que "Bean without Id is anonymous" et "The bean is anonymous. No id is generated.", alros que ce n'est pas vrai. En fait, chaque bean dans le conteneur spring possède un identifiant qui peut être  id, nom ou alias. Si aucun attribut n'est spécifié, un identifiant ayant ce format "Package.className#num_instance" sera affecté à ce bean. Dans l'attribut "beanDefinitionMap" spring map chaque bean à son identifiant et dans "aliasMap" spring map les alias (id, nom, alias) à l'identifiant.

    *Au niveau de la question 12, cette écriture est fausse "@Bean("clientRepository")" elle doit être comme ça"@Bean(name="clientRepository")".

    Cordialement.

    Zied ANDOLSI
  post_url: /2012/02/core-spring-3-0-certification-mock-exam/
  post_id: "18"
- id: "12954"
  author_name: Antoine
  author_email: antoine.rey@free.fr
  author_url: http://www.javaetmoi.com
  published: 2013-10-30T21:32:32Z
  parent_id: "12850"
  content: |-
    Bonjour Zied,
    Je te remercie pour ces rectifications qui sont tout à fait justes.
    L’utilisation du terme bean anonyme est juste (cf. http://docs.spring.io/spring/docs/3.2.4.RELEASE/spring-framework-reference/html/beans.html#beans-autowired-annotation-qualifiers). Par contre, le conteneur Spring génère bel et bien un identifiant. Il existait d’ailleurs également une autre coquille dans la réponse de la question 2 (ID = com.spring.service.BankServiceImpl#0).
    Tes corrections ont été prises en compte, à la fois dans la version PDF que dans le questionnaire en ligne.
    N’hésite pas à me faire d’autres retours.
    Antoine
