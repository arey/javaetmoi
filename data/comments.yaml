  parent_id: "0"
  content: |-
    Bonjour Antoine,

    voici un retour trèèèèèès détaillé du lab, c'est impressionnant :)
    Quelques corrections à apporter :

    Dans la partie sur les restrictions de la clause where, on peut requêter sur "id_flux, start_time et id_etape". Ce qu'on ne peut pas faire c'est requêter sur "id_flux et start_time" car il manquerait la clause sur "id_etape" qui est avant "start_time" dans la PK. L'ordre à proprement parler dans la clause WHERE n'a pas d'importance par contre, donc inverser "id_etape" et "start_time" par rapport à leur ordre dans la clé de clustering n'aura aucune incidence.

    La taille max de partition à respecter est 100 Mo, pas 100 Go :) A 100 Go on est déjà dans de sacrés ennuis...

    Un TTL de 3 mois correspond à ~7776000 au lieu de 86400 (1 jour).

    Dans la partie 2 du lab, on fait toujours des suppressions (pas le choix) mais on limite la durée de vie des partitions en utilisant un bucketing temporel (à la minute). Du coup on aura moins de tombstone par partition/lecture.
    Pour le problème de concurrence d'accès, ce sont les LightWeights Transaction effectuée sur le champ processed_by qui vont nous permettre de "locker" les enregistrements.
